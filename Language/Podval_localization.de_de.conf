  "Podval"
  "Podval & Vlad333000"
  "Following the sudden escalation of the conflict on Arland Island, the strategic town of Beauregard found itself on the front line. Control of its intersections, storage areas, and port infrastructure will allow one side to gain a foothold in the region and secure supplies for its forces. Russian Forces and US Army units are striving to take key positions in the town and hold them at all costs."
  "Following the Russian air strike on Morton, a U.S. fuel depot southeast of Manatee was left undefended. Its capture could disrupt plans to evacuate U.S. Army forces from the island."
  "A small number of US troops are fighting for their lives. Cut off by the Russian forces at Pennants Pass and retreating from Saint-Pierre, they now have no choice but to secure the Montfort Castle. From this ancient stronghold they may be able to hold out, but just a little longer..."
  "The Arma-Beton concrete plant is a key defensive position on the road to Everon International. If Russian forces take it, they can stage an attack on the airport and surround US troops in Saint-Philippe!"
  "Saint-Philippe hangs in the balance. Fierce fighting around the furniture factory on the outskirts of the town has forced both sides from the site. But such an impasse cannot last — whoever captures and reinforces this position will most likely take the capital, and Everon itself."
  "he farm at Simon's Wood sits near the junction of key roads connecting Everon's North, South, and West. A breakthrough here may open up half the island..."
  "Russian forces have taken Lamentin. However, NATO forces based at Montignac have responded swiftly, ambushing Russian armor at Le Moule. They must now drive a wedge between this village and the beachhead at Morton, if they wish to hold the island!"
  "Camp Blake, just south of the village of Levie, overlooks the main road from Saint-Pierre. Additionally, it's situated on a natural chokepoint, where the island narrows. A victory here will cut Everon in half."
  "A small detachment of Russian forces from Kolgujev has established a beachhead at Morton. It may be a feint or the thin end of a wedge, but NATO troops are responding to the threat in force."
